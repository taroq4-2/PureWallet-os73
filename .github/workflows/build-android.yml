name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup signing keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using production keystore"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/purewallet.jks
            echo "KS_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}"     >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"       >> $GITHUB_ENV
          else
            echo "No keystore secret — generating auto-signed keystore"
            AUTO_PASS=$(openssl rand -hex 24)
            keytool -genkeypair -v \
              -keystore /tmp/purewallet.jks -alias purewallet \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$AUTO_PASS" -keypass "$AUTO_PASS" \
              -dname "CN=PureWallet,OU=OS73,O=OS73,L=Riyadh,ST=Riyadh,C=SA" -noprompt
            echo "KS_PASS=$AUTO_PASS"  >> $GITHUB_ENV
            echo "KEY_PASS=$AUTO_PASS" >> $GITHUB_ENV
            echo "KEY_ALIAS=purewallet" >> $GITHUB_ENV
          fi

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: "1"

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=/tmp/purewallet.jks \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3500m -XX:MaxMetaspaceSize=512m"

      - name: Copy APK
        run: |
          mkdir -p output
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          [ -z "$APK" ] && echo "❌ APK not found" && exit 1
          cp "$APK" output/PureWallet-v2.0.0.apk
          ls -lh output/

      - uses: actions/upload-artifact@v4
        with:
          name: PureWallet-release-apk
          path: output/PureWallet-v2.0.0.apk
          retention-days: 30

      - run: echo "## ✅ APK ready — download from Artifacts above" >> $GITHUB_STEP_SUMMARY
