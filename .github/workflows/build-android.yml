name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── Keystore setup ──────────────────────────────────────────────────────
      # Production: set KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_PASSWORD,
      #             KEY_ALIAS as GitHub repository secrets.
      # Testing:    leave secrets unset; a fresh keystore is auto-generated.
      - name: Setup signing keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from secret"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/purewallet.jks
            echo "KS_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}"      >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"        >> $GITHUB_ENV
          else
            echo "No keystore secret — generating auto-signed keystore for testing"
            AUTO_PASS=$(openssl rand -hex 24)
            keytool -genkeypair -v \
              -keystore /tmp/purewallet.jks \
              -alias purewallet \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass "$AUTO_PASS" \
              -keypass   "$AUTO_PASS" \
              -dname "CN=PureWallet, OU=OS73, O=OS73, L=Riyadh, ST=Riyadh, C=SA" \
              -noprompt
            echo "KS_PASS=$AUTO_PASS"    >> $GITHUB_ENV
            echo "KEY_PASS=$AUTO_PASS"   >> $GITHUB_ENV
            echo "KEY_ALIAS=purewallet"  >> $GITHUB_ENV
          fi

      - name: Expo prebuild (generate Android project)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Bundle JS for release
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=/tmp/purewallet.jks \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/PureWallet-v1.0.0.apk
          ls -lh output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureWallet-release-apk
          path: output/PureWallet-v1.0.0.apk
          retention-days: 30

      - name: Summary
        run: echo "Signed APK ready — download from the Artifacts section above"
