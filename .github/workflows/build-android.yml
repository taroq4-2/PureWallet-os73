name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Signing keystore ───────────────────────────────────────────────────
      # Production: add KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_PASSWORD,
      #             KEY_ALIAS as GitHub Actions secrets in repo settings.
      # CI testing: leave secrets unset — an auto-generated keystore is used.
      - name: Setup signing keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using production keystore"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/purewallet.jks
            echo "KS_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}"     >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"       >> $GITHUB_ENV
          else
            echo "Generating auto-signed keystore for CI"
            AUTO_PASS=$(openssl rand -hex 24)
            keytool -genkeypair -v \
              -keystore /tmp/purewallet.jks \
              -alias purewallet \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass "$AUTO_PASS" \
              -keypass   "$AUTO_PASS" \
              -dname "CN=PureWallet,OU=OS73,O=OS73,L=Riyadh,ST=Riyadh,C=SA" \
              -noprompt
            echo "KS_PASS=$AUTO_PASS"  >> $GITHUB_ENV
            echo "KEY_PASS=$AUTO_PASS" >> $GITHUB_ENV
            echo "KEY_ALIAS=purewallet" >> $GITHUB_ENV
          fi

      - name: Expo prebuild (generate native Android project)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: "1"
          EXPO_NO_DOTENV: "1"

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=/tmp/purewallet.jks \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3500m -XX:MaxMetaspaceSize=512m"

      - name: Copy APK to output
        run: |
          mkdir -p output
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then echo "❌ APK not found"; exit 1; fi
          cp "$APK" output/PureWallet-v2.0.0.apk
          ls -lh output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PureWallet-release-apk
          path: output/PureWallet-v2.0.0.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ APK Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "Download **PureWallet-release-apk** from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
          ls -lh output/PureWallet-v2.0.0.apk >> $GITHUB_STEP_SUMMARY
