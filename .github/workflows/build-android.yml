name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup signing keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using provided keystore"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/purewallet.jks
            echo "KS_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}"     >> "$GITHUB_ENV"
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"       >> "$GITHUB_ENV"
          else
            echo "Generating auto-signed keystore for testing"
            AUTO_PASS=$(openssl rand -hex 24)
            keytool -genkeypair -v \
              -keystore /tmp/purewallet.jks \
              -alias purewallet \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass "$AUTO_PASS" \
              -keypass   "$AUTO_PASS" \
              -dname "CN=PureWallet,OU=OS73,O=OS73,L=Riyadh,ST=Riyadh,C=SA" \
              -noprompt
            echo "KS_PASS=$AUTO_PASS"   >> "$GITHUB_ENV"
            echo "KEY_PASS=$AUTO_PASS"  >> "$GITHUB_ENV"
            echo "KEY_ALIAS=purewallet" >> "$GITHUB_ENV"
          fi

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Build signed APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=/tmp/purewallet.jks \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Collect APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/PureWallet-v1.0.0.apk
          ls -lh output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PureWallet-release-apk
          path: output/PureWallet-v1.0.0.apk
          retention-days: 30

      - name: Summary
        run: echo "APK ready — download from Artifacts section above"
