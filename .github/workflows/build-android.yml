name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/purewallet.jks \
            -alias purewallet \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=PureWallet, OU=OS73, O=OS73, L=Riyadh, ST=Riyadh, C=SA" \
            -noprompt
          echo "✅ Keystore generated"

      - name: Expo prebuild (generate Android project)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Bundle JS for release
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=/tmp/purewallet.jks \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=purewallet \
            -Pandroid.injected.signing.key.password=android123
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/PureWallet-v1.0.0.apk
          ls -lh output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureWallet-release-apk
          path: output/PureWallet-v1.0.0.apk
          retention-days: 30

      - name: Done
        run: echo "✅ Signed Release APK ready!"
